# ============================================================
#  cloudflare worker config
#  edit "name" and the database_id after you create the db.
# ============================================================
name = "discord-hub-api"
main = "worker.js"
compatibility_date = "2024-11-01"

# --- D1 database binding ---
# create it once with:  npx wrangler d1 create hub-db
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"                 # this is env.DB in worker.js — do not rename
database_name = "hub-db"
database_id = "8957a04d-303a-4cec-822a-1ad6c0dd339c"

# --- non-secret vars (fine to keep here) ---
[vars]
# your github pages origin, used for CORS. no trailing slash.
# example: "https://yourname.github.io"
ALLOWED_ORIGIN = "https://critism.github.io"

# comma-separated discord user ids. each level includes the ones below it,
# so you only need to list a person ONCE, at their highest level.
# STAFF_IDS      → answer all tickets, staff chat, respond to activity checks
# HIGH_STAFF_IDS → staff + review applications + post announcements + start checks
# OWNER_IDS      → everything + manage strikes, delete checks/chat messages
#                  (owners are exempt from activity-check strikes)
STAFF_IDS = "1374092363864997901,1497639444616839269,643238637416218664,1480256454005887192,1140056745683730522,1406661746458103821"
HIGH_STAFF_IDS = "1312757482808021094,1132696096670503024,1180831019553796147"
OWNER_IDS = "1506520499855949924"

# --- cron: checks every hour whether an activity check expired ---
# (strikes are also handed out lazily when staff open the panel,
#  so this is a safety net, not a requirement)
[triggers]
crons = ["0 * * * *"]

# --- secrets (do NOT put here) ---
# set the webhook as a secret instead of a var:
#   npx wrangler secret put TICKET_WEBHOOK
# then paste your discord webhook url when prompted.
