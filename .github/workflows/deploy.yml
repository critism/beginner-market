name: deploy site to github pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # only the public frontend config is injected here — no secrets,
      # because the frontend no longer holds the webhook or staff ids.
      # (those live on the cloudflare worker now.)
      # this step is optional: you can also just edit index.html directly.
      - name: setup pages
        uses: actions/configure-pages@v5

      - name: upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
